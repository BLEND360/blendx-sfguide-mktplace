spec:
  containers:
    - name: eap-frontend
      image: /spcs_app/napp/img_repo/eap_frontend
      env:
        VUE_APP_API_URL: /api
    - name: eap-backend
      image: /spcs_app/napp/img_repo/eap_backend
      env:
        ENVIRONMENT: PRODUCTION
        SNOWFLAKE_AUTHMETHOD: oauth
        SNOWFLAKE_WAREHOUSE: WH_NAC
        CREWAI_DISABLE_TELEMETRY: true
        OTEL_SDK_DISABLED: true
        SERPER_API_KEY: _udf_serper_api_key
      secrets:
        - snowflake_secret: serper_api_key
          env_name: SERPER_API_KEY

    - name: eap-router
      image: /spcs_app/napp/img_repo/eap_router
      env:
        FE_SERVER: 127.0.0.1:8080
        BE_SERVER: 127.0.0.1:8081
  endpoints:
    - name: app
      port: 8000
      public: true