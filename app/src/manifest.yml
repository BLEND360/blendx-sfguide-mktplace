#version identifier
manifest_version: 2

version:
  name: V1
  label: "Version One"
  comment: "The first version of our Native Application that includes SPCS"


#artifacts that are distributed from this version of the package
artifacts:
  readme: readme.md
  setup_script: setup.sql
  container_services:
    images:
      - /spcs_app/napp/img_repo/eap_frontend
      - /spcs_app/napp/img_repo/eap_backend
      - /spcs_app/napp/img_repo/eap_router

privileges:
 - CREATE COMPUTE POOL:
      description: "Enable application to create its own compute pool(s)"
 - BIND SERVICE ENDPOINT:
      description: "Enables application to expose service endpoints"
 - CREATE WAREHOUSE:
      description: "Enables application to create its own warehouse(s)"
 - EXECUTE MANAGED TASK:
      description: "Enables application to execute Snowflake Cortex functions"
 - IMPORTED PRIVILEGES ON SNOWFLAKE DB:
      description: "Enables application to use Snowflake Cortex AI functions"

references:
  - serper_api_key:
      label: "Serper API Key Secret"
      description: "Secret containing the API key for Serper search tool"
      privileges:
        - USAGE
      object_type: SECRET
      register_callback: config.register_single_reference
      configuration_callback: config.get_config_for_ref
  - serper_external_access:
      label: "External Access Integration for Serper API"
      description: "External access integration to allow network requests to serper.dev API"
      privileges:
        - USAGE
      object_type: EXTERNAL ACCESS INTEGRATION
      register_callback: config.register_single_reference
      configuration_callback: config.get_config_for_ref

configuration:
  log_level: INFO
  trace_level: OFF
